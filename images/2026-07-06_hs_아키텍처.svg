  <!-- 홈 -->
  <rect x="40" y="266" width="300" height="150" rx="10" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  <text x="55" y="290" font-size="10" fill="#2563eb" letter-spacing="1.5" font-weight="bold">홈 · index.qmd</text>
  <text x="55" y="312" font-size="13" fill="#111827" font-weight="bold">랜딩 = 유일한 내비게이션</text>
  <text x="55" y="332" font-size="10" fill="#6b7280">히어로 · 학습 방식 3칸 · 교육과정 지도</text>
  <text x="55" y="348" font-size="10" fill="#6b7280">내브바 없음 — 카드에서 모듈로 직행</text>
  <text x="55" y="364" font-size="10" fill="#6b7280">모듈 상단 ← 홈 링크로 복귀</text>
  <text x="55" y="392" font-size="9" fill="#9ca3af">BitStat2-quarto 랜딩(.bs- 디자인 시스템) 계승</text>

  <line x1="340" y1="341" x2="380" y2="341" stroke="#d1d5db" stroke-width="1"/>

  <!-- 모듈 페이지 -->
  <rect x="380" y="266" width="440" height="150" rx="10" fill="none" stroke="#9ca3af" stroke-width="1"/>
  <text x="395" y="290" font-size="10" fill="#2563eb" letter-spacing="1.5" font-weight="bold">모듈 페이지 · pages/NN_단원/모듈/index.qmd × 18</text>
