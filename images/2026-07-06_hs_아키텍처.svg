    <text x="810" y="494">04 통계적 추정</text>
    <text x="810" y="510" fill="#9ca3af">확통 · 4 모듈</text>
    <text x="1020" y="494">05 통계와 사회</text>
    <text x="1020" y="510" fill="#9ca3af">실생활 데이터 · 4 모듈</text>
  </g>
  <text x="620" y="532" font-size="9.5" fill="#9ca3af" text-anchor="middle">01은 중학 통계 복습(진단), 02–04는 「확률과 통계」, 05는 「통계와 사회」·탐구 프로젝트에 대응</text>

  <!-- ===== 기술 스택 밴드 ===== -->
  <text x="40" y="580" font-size="10" fill="#9ca3af" letter-spacing="2">기술 스택 — BitStat2-shiny 트랙과 동일 계열 (검증된 조합 재사용)</text>
  <rect x="40" y="592" width="1160" height="96" rx="10" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <g font-size="10.5" fill="#6b7280">
    <text x="60" y="618" fill="#111827" font-weight="bold">Quarto website</text>
    <text x="60" y="634">engine: knitr 필수</text>
    <text x="60" y="650">render: index + pages/**</text>
    <text x="290" y="618" fill="#111827" font-weight="bold">shinylive × webR</text>
    <text x="290" y="634">인라인 {shinylive-r} standalone</text>
    <text x="290" y="650">_environment로 자산 버전 고정</text>
    <text x="560" y="618" fill="#111827" font-weight="bold">hsData 패키지</text>
    <text x="560" y="634">고교생 눈높이 실생활 데이터</text>
    <text x="560" y="650">webR 패키지 목록에 포함 검증 필요</text>
    <text x="840" y="618" fill="#111827" font-weight="bold">한글·배포</text>
    <text x="840" y="634">showtext_auto() (shinylive 쪽 표준)</text>
    <text x="840" y="650">GitHub Pages gh-pages · docs/ 미추적</text>
  </g>
  <text x="60" y="674" font-size="9" fill="#92400e">주의(GOTCHA 계승) — iCloud 경로 렌더 손상 → 비iCloud 빌드 디렉터리 · 서비스워커 캐시 → 새 포트로 검증 · shinylive/webR 버전 정렬 필수</text>

  <!-- ===== 주석 (왼쪽 여백 스타일) ===== -->
  <g font-size="10" fill="#6b7280" font-style="italic">
    <text x="40" y="726">왜 서버리스인가 — 학교 전산실은 설치·관리자 권한이 막혀 있다.</text>
    <text x="40" y="741">브라우저만 있으면 45분 수업 안에 전원이 같은 화면에 도달한다. 첫 로딩 1–2분은 수업 도입(개념 설명) 시간과 겹치게 설계.</text>
  </g>

