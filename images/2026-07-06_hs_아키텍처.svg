  <text x="40" y="104" font-size="10" fill="#9ca3af" letter-spacing="2">생태계 내 위치</text>
  <g>
    <rect x="40" y="116" width="255" height="74" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    <text x="55" y="140" font-size="11" fill="#6b7280" font-weight="bold">BitStat2 포털</text>
    <text x="55" y="158" font-size="9.5" fill="#9ca3af">랜딩 1페이지 · 트랙 안내</text>
    <text x="55" y="174" font-size="9.5" fill="#9ca3af">대상: 비전공 일반인</text>

    <rect x="315" y="116" width="255" height="74" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    <text x="330" y="140" font-size="11" fill="#6b7280" font-weight="bold">BitStat2-shiny — 앱 트랙</text>
    <text x="330" y="158" font-size="9.5" fill="#9ca3af">shinylive 앱 23개 · 만지며 직관</text>
    <text x="330" y="174" font-size="9.5" fill="#9ca3af">모듈 UI 원형 제공 →</text>

    <rect x="590" y="116" width="255" height="74" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    <text x="605" y="140" font-size="11" fill="#6b7280" font-weight="bold">BitStat2-quarto — 코드 트랙</text>
    <text x="605" y="158" font-size="9.5" fill="#9ca3af">Quarto Live · 편집형 R 셀 · 자동 채점</text>
    <text x="605" y="174" font-size="9.5" fill="#9ca3af">랜딩·커리큘럼 지도 문법 제공 →</text>

