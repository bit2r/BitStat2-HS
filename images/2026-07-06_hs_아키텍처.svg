  <text x="395" y="332" font-size="10" fill="#6b7280">① 교과서 개념 요약 + 여백 주석(성취기준 표기)</text>
  <text x="395" y="348" font-size="10" fill="#6b7280">② 탭셋: [인터랙티브 앱 | R 코드] — shinylive + webr 셀</text>
  <text x="395" y="364" font-size="10" fill="#6b7280">③ 확인 문제 · 짝 모듈(이전/다음 단원) 링크</text>
  <text x="395" y="392" font-size="9" fill="#9ca3af">앱 UI 원형: BitStat2-shiny clt 모듈 (bslib page_sidebar · Tufte 테마)</text>

  <line x1="820" y1="341" x2="860" y2="341" stroke="#d1d5db" stroke-width="1"/>

  <!-- 데이터 탐색기 -->
  <rect x="860" y="266" width="340" height="150" rx="10" fill="none" stroke="#9ca3af" stroke-width="1"/>
  <text x="875" y="290" font-size="10" fill="#2563eb" letter-spacing="1.5" font-weight="bold">데이터 탐색기 · 05단원 핵심 앱</text>
  <text x="875" y="312" font-size="13" fill="#111827" font-weight="bold">hsData 실생활 데이터 실험실</text>
  <text x="875" y="332" font-size="10" fill="#6b7280">데이터셋 선택 → 표 · 상세정보 → 변수 끌어놓기</text>
  <text x="875" y="348" font-size="10" fill="#6b7280">→ 요약 통계량 · 숫자형/범주형 시각화</text>
  <text x="875" y="364" font-size="10" fill="#6b7280">통계와 사회 과목의 탐구 프로젝트 무대</text>
  <text x="875" y="392" font-size="9" fill="#9ca3af">기존 BitStat2-HS gridlayout 앱(app.R)을 shinylive로 이식·흡수</text>

  <!-- ===== 단원 밴드 ===== -->
  <line x1="600" y1="416" x2="600" y2="440" stroke="#d1d5db" stroke-width="1"/>
  <rect x="90" y="440" width="1060" height="104" rx="10" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <text x="620" y="464" font-size="12" fill="#111827" text-anchor="middle" font-weight="bold">교육과정 정렬 5개 단원 — 18개 모듈 (상세: 커리큘럼 지도 SVG)</text>
  <g font-size="10" fill="#6b7280" text-anchor="middle">
    <text x="215" y="494">01 자료와 그래프</text>
    <text x="215" y="510" fill="#9ca3af">중등 기초 · 4 모듈</text>
    <text x="425" y="494">02 경우의 수와 확률</text>
    <text x="425" y="510" fill="#9ca3af">확통 · 3 모듈</text>
