<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" font-family="Georgia, 'Apple SD Gothic Neo', 'Noto Serif KR', serif">
  <!-- Tufte-style: 잉크 최소 · 헤어라인 · 단일 액센트(#2563EB) · 직접 라벨 -->
  <!-- 2026-07-06: 고등학생용 빛스탯(BitStat2-HS) 전체 아키텍처 설계 -->
  <rect width="1240" height="820" fill="#ffffff"/>

  <!-- ===== 헤더 ===== -->
  <text x="40" y="42" font-size="22" fill="#111827" font-weight="bold">빛스탯 HS — 고등학생용 빛스탯2 아키텍처</text>
  <text x="40" y="64" font-size="12" fill="#6b7280">BitStat2 생태계의 네 번째 자매 사이트 · 교육과정 정렬 · 서버리스 · 2026-07-06</text>
  <line x1="40" y1="76" x2="1200" y2="76" stroke="#e5e7eb" stroke-width="1"/>

