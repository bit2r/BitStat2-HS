    <text x="880" y="134" font-size="10" fill="#2563eb" letter-spacing="1.5" font-weight="bold">신규 · BitStat2-HS</text>
    <text x="880" y="156" font-size="13" fill="#111827" font-weight="bold">빛스탯 HS — 교실에서 만지는 통계</text>
    <text x="880" y="174" font-size="9.5" fill="#6b7280">대상: 고등학생·수학교사 · 교육과정 정렬</text>
