<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <style>
    .bg{fill:#fff}.ink{fill:#111827}.muted{fill:#6b7280}.ok{fill:#16a34a}
    .rule{stroke:#e5e7eb}.ghost{fill:none;stroke:#9ca3af;stroke-dasharray:4 3}
    .core{fill:#cbd5e1}.mpl{fill:#2563eb}.np{fill:#f59e0b}
    .mono{font-family:'SFMono-Regular',Menlo,Consolas,monospace}
    @media (prefers-color-scheme: dark){
      .bg{fill:#0b0f19}.ink{fill:#e5e7eb}.muted{fill:#9ca3af}.ok{fill:#4ade80}
      .rule{stroke:#1f2937}.core{fill:#475569}.ghost{stroke:#6b7280}
    }
  </style>
  <rect class="bg" x="0" y="0" width="880" height="500"/>

  <text class="ink" x="40" y="40" font-size="21" font-weight="700">matplotlib → 인라인 SVG 전환 — 속도 개선 결과 (실측)</text>
  <text class="muted" x="40" y="61" font-size="12.5">25개 앱 전부 stdlib + 인라인 SVG로 전환 · 앱 첫 방문 다운로드 페이로드(모듈당) · 브라우저 실측 2026-07-07</text>

  <!-- Legend -->
  <g font-size="12">
    <rect class="core" x="40" y="80" width="13" height="13" rx="2"/><text class="muted" x="58" y="91">런타임+shiny 22.6 MB (하한)</text>
    <rect class="mpl" x="270" y="80" width="13" height="13" rx="2"/><text class="muted" x="288" y="91">matplotlib 스택 9.4</text>
    <rect class="np" x="440" y="80" width="13" height="13" rx="2"/><text class="muted" x="458" y="91">numpy 2.9</text>
  </g>

  <!-- x ticks 15px/MB, x0=150 → 0:150,10:300,20:450,30:600 -->
  <g class="rule" stroke-width="1">
    <line x1="150" y1="100" x2="150" y2="188"/><line x1="300" y1="100" x2="300" y2="188"/>
    <line x1="450" y1="100" x2="450" y2="188"/><line x1="600" y1="100" x2="600" y2="188"/>
  </g>
  <g class="muted" font-size="10.5" text-anchor="middle">
    <text x="150" y="202">0</text><text x="300" y="202">10</text><text x="450" y="202">20</text><text x="600" y="202">30 MB</text>
  </g>

  <!-- Bar 전환 전 -->
  <text class="ink" x="140" y="120" font-size="12.5" font-weight="600" text-anchor="end">전환 전</text>
  <text class="muted" x="140" y="135" font-size="10.5" text-anchor="end">matplotlib 앱</text>
  <rect class="core" x="150" y="107" width="339"   height="27"/>
  <rect class="mpl"  x="489" y="107" width="141"   height="27"/>
  <rect class="np"   x="630" y="107" width="43.5"  height="27"/>
  <text class="ink" x="681" y="125" font-size="12.5" font-weight="700">34.9 MB</text>

  <!-- Bar 전환 후 -->
  <text class="ink" x="140" y="166" font-size="12.5" font-weight="600" text-anchor="end">전환 후</text>
  <text class="muted" x="140" y="181" font-size="10.5" text-anchor="end">stdlib + SVG</text>
  <rect class="core" x="150" y="153" width="339" height="27"/>
  <rect class="ghost" x="489" y="153" width="184.5" height="27"/>
  <text class="muted" x="581.5" y="170" font-size="10" text-anchor="middle" font-style="italic">제거된 영역</text>
  <text class="ok" x="481" y="171" font-size="12.5" font-weight="700" text-anchor="end">22.6 MB</text>

  <!-- delta callout -->
  <text class="ok" x="700" y="152" font-size="15" font-weight="700">−12.3 MB</text>
  <text class="ok" x="700" y="172" font-size="18" font-weight="700">−35%</text>

  <!-- removed wheels -->
  <text class="muted" x="150" y="226" font-size="11">제거된 휠 12개(12.3 MB): matplotlib · contourpy · pillow · fonttools · kiwisolver · cycler · pyparsing · dateutil · pytz · numpy …</text>

  <!-- Method -->
  <line class="rule" x1="40" y1="244" x2="840" y2="244" stroke-width="1"/>
  <text class="ink" x="40" y="268" font-size="14" font-weight="700">방법 — 브라우저가 받는 무거운 패키지를 없애고, 순수 파이썬으로 대체</text>
  <g font-size="12">
    <text class="mono ink" x="52" y="294">import matplotlib.pyplot · numpy</text>
    <text class="muted" x="352" y="294">→</text>
    <text class="mono ink" x="378" y="294">파이썬 인라인 SVG 문자열 + ui.HTML</text>
    <text class="mono ink" x="52" y="320">ax.bar / hist / scatter / plot</text>
    <text class="muted" x="352" y="320">→</text>
    <text class="mono mpl" x="378" y="320">&lt;rect&gt; &lt;circle&gt; &lt;path d="M..L.."&gt;</text>
    <text class="mono ink" x="52" y="346">np.mean / median / std / random</text>
    <text class="muted" x="352" y="346">→</text>
    <text class="mono ink" x="378" y="346">statistics · math · random · collections</text>
  </g>

  <!-- Bottom band -->
  <line class="rule" x1="40" y1="366" x2="840" y2="366" stroke-width="1"/>
  <g font-size="12.5">
    <text class="ok" x="40" y="392" font-size="15" font-weight="700">✓</text>
    <text class="ink" x="60" y="392" font-weight="600">25 / 25 앱 matplotlib-free</text>
    <text class="muted" x="240" y="392">전엔 5/25만 SVG → 이제 전부 · numpy import 0</text>

    <text class="ok" x="40" y="418" font-size="15" font-weight="700">✓</text>
    <text class="ink" x="60" y="418" font-weight="600">다운로드 시간</text>
    <text class="muted" x="240" y="418">20 Mbps 14.0초 → 9.0초 · Slow 4G 27.9초 → 18.1초</text>

    <text class="ok" x="40" y="444" font-size="15" font-weight="700">✓</text>
    <text class="ink" x="60" y="444" font-weight="600">덤: 한글 폰트 깨짐 해소</text>
    <text class="muted" x="240" y="444">Pyodide엔 한글 폰트 없어 matplotlib 축이 □ → SVG는 브라우저 폰트 사용</text>
  </g>

  <line class="rule" x1="40" y1="462" x2="840" y2="462" stroke-width="1"/>
  <text class="muted" x="40" y="484" font-size="11">실측(Playwright): freq_table·make_chart 로드 시 pyodide 요청이 openssl에서 종료 — matplotlib·numpy·pillow·fonttools 미로드 확인 · 초기화 시간도 함께 단축.</text>
</svg>
