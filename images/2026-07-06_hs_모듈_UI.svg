<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 920" font-family="Georgia, 'Apple SD Gothic Neo', 'Noto Serif KR', serif">
  <!-- Tufte-style: 잉크 최소 · 헤어라인 · 단일 액센트(#2563EB) · 직접 라벨 -->
  <!-- 2026-07-06: 빛스탯 HS 모듈 페이지 UI 와이어프레임 — 예시: 03_dist/normal 정규분포 -->
  <rect width="1240" height="920" fill="#ffffff"/>

  <!-- ===== 헤더 ===== -->
  <text x="40" y="42" font-size="22" fill="#111827" font-weight="bold">빛스탯 HS — 모듈 페이지 UI 와이어프레임</text>
  <text x="40" y="64" font-size="12" fill="#6b7280">18개 모듈 공통 템플릿 · 예시: 03_dist/normal (정규분포와 표준화) · 2026-07-06</text>
  <line x1="40" y1="76" x2="1200" y2="76" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ===== 페이지 프레임 ===== -->
  <rect x="40" y="96" width="800" height="784" rx="10" fill="none" stroke="#9ca3af" stroke-width="1.2"/>

  <!-- ① 상단: 복귀 링크 + 제목 + 성취기준 -->
  <text x="70" y="126" font-size="10" fill="#2563eb">← 빛스탯 HS 홈</text>
  <text x="70" y="158" font-size="20" fill="#111827" font-weight="bold">정규분포와 표준화</text>
  <text x="70" y="180" font-size="9.5" fill="#9ca3af">단원 03 확률분포 · 「확률과 통계」 성취기준 태그 · 1차시(45분) 분량</text>
  <line x1="70" y1="196" x2="810" y2="196" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ② 개념 도입 (본문 + 여백 주석 2단) -->
  <text x="70" y="222" font-size="9" fill="#9ca3af" letter-spacing="2">② 개념 도입 — 교과서 요약 (본문 5–8문장) + 여백 주석</text>
  <g font-size="10" fill="#6b7280">
    <text x="70" y="246">본문 — 정규분포의 뜻, 곡선의 성질(대칭·종 모양),</text>
    <text x="70" y="262">m과 σ가 곡선을 어떻게 움직이는지. 수식은 교과서</text>
    <text x="70" y="278">수준: N(m, σ²), Z = (X−m)/σ 까지만.</text>
  </g>
  <line x1="560" y1="230" x2="560" y2="290" stroke="#e5e7eb" stroke-width="1"/>
  <g font-size="9.5" fill="#9ca3af" font-style="italic">
    <text x="576" y="246">여백 주석(column-margin) —</text>
    <text x="576" y="261">키·수능 표준점수 등 학생 경험과</text>
    <text x="576" y="276">닿는 예시 한 줄, 용어 환기.</text>
  </g>

  <!-- ③ 탭셋 -->
  <text x="70" y="322" font-size="9" fill="#9ca3af" letter-spacing="2">③ 탭셋 {.panel-tabset} — 앱이 기본 탭</text>
  <g font-size="10.5">
    <text x="70" y="346" fill="#2563eb" font-weight="bold">인터랙티브 앱</text>
    <text x="185" y="346" fill="#9ca3af">R 코드</text>
  </g>
  <line x1="70" y1="354" x2="810" y2="354" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="70" y1="354" x2="160" y2="354" stroke="#2563eb" stroke-width="2"/>

  <!-- 앱 프레임: shinylive-r standalone -->
  <rect x="70" y="368" width="740" height="330" rx="8" fill="none" stroke="#9ca3af" stroke-width="1"/>
  <text x="82" y="388" font-size="8.5" fill="#9ca3af">{shinylive-r} standalone · bslib page_sidebar · Tufte 테마(크림 #fffff8 · 세리프 · 러스트 액센트) — clt 모듈 원형</text>

  <!-- 앱 사이드바 -->
  <rect x="86" y="400" width="190" height="282" rx="6" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <text x="100" y="424" font-size="10" fill="#111827" font-weight="bold">조절판 (sidebar)</text>
  <text x="100" y="448" font-size="9.5" fill="#6b7280">평균 m</text>
  <line x1="100" y1="460" x2="260" y2="460" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="180" cy="460" r="5" fill="#2563eb"/>
  <text x="100" y="486" font-size="9.5" fill="#6b7280">표준편차 σ</text>
  <line x1="100" y1="498" x2="260" y2="498" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="140" cy="498" r="5" fill="#2563eb"/>
  <text x="100" y="524" font-size="9.5" fill="#6b7280">구간 [a, b] (넓이 = 확률)</text>
  <line x1="100" y1="536" x2="260" y2="536" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="150" cy="536" r="5" fill="#2563eb"/>
  <circle cx="220" cy="536" r="5" fill="#2563eb"/>
  <rect x="100" y="556" width="12" height="12" rx="2" fill="none" stroke="#6b7280"/>
  <text x="120" y="566" font-size="9.5" fill="#6b7280">표준정규 Z 겹쳐 보기</text>
  <text x="100" y="596" font-size="8.5" fill="#9ca3af">슬라이더 3개 + 체크 1개 이내 —</text>
  <text x="100" y="610" font-size="8.5" fill="#9ca3af">입력이 많으면 개념이 흐려진다</text>

  <!-- 앱 메인: 그래프 카드 -->
  <rect x="292" y="400" width="502" height="212" rx="6" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <text x="306" y="424" font-size="10" fill="#111827" font-weight="bold">정규분포 곡선 N(m, σ²)</text>
  <!-- 축 -->
  <line x1="320" y1="580" x2="770" y2="580" stroke="#9ca3af" stroke-width="1"/>
  <!-- 종 곡선 -->
  <path d="M 330 578 C 430 578 470 448 545 448 C 620 448 660 578 760 578" fill="none" stroke="#111827" stroke-width="1.5"/>
  <!-- 넓이=확률 음영 (액센트) -->
  <path d="M 490 578 C 510 500 520 460 545 448 C 570 460 585 500 600 542 L 600 578 Z" fill="#2563eb" opacity="0.15"/>
  <line x1="490" y1="578" x2="490" y2="520" stroke="#2563eb" stroke-width="1"/>
  <line x1="600" y1="578" x2="600" y2="540" stroke="#2563eb" stroke-width="1"/>
  <text x="545" y="530" font-size="9.5" fill="#2563eb" text-anchor="middle">P(a ≤ X ≤ b)</text>
  <text x="545" y="596" font-size="8.5" fill="#9ca3af" text-anchor="middle">m</text>

  <!-- 인라인 통계 줄 -->
  <rect x="292" y="624" width="502" height="58" rx="6" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <text x="306" y="648" font-size="10" fill="#111827" font-weight="bold">읽어주는 줄 (인라인 텍스트, 값 상자 아님)</text>
  <text x="306" y="668" font-size="9.5" fill="#6b7280">“P(65 ≤ X ≤ 75) = 0.6247 — 표준화하면 P(−1.0 ≤ Z ≤ 1.0)과 같다.” — 조작 결과를 문장으로 해석</text>

  <!-- ④ 확인 문제 + 이동 -->
  <text x="70" y="726" font-size="9" fill="#9ca3af" letter-spacing="2">④ 확인 문제 + 단원 내 이동</text>
  <rect x="70" y="738" width="500" height="84" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <text x="86" y="762" font-size="10" fill="#111827" font-weight="bold">스스로 확인 (접기 상자 2–3문항)</text>
  <text x="86" y="782" font-size="9.5" fill="#6b7280">“σ를 두 배로 하면 곡선은 어떻게 변하는가?” — 앱을 조작해 답을</text>
  <text x="86" y="797" font-size="9.5" fill="#6b7280">확인하게 유도 · 정답은 callout 접기(자동 채점은 코드 트랙 몫)</text>
  <g font-size="9.5" fill="#2563eb">
    <text x="600" y="770">← 이전: 이항분포</text>
    <text x="600" y="792">다음: 표본추출 →</text>
  </g>

  <text x="70" y="852" font-size="9" fill="#9ca3af">페이지 하단 — 자매 링크: “이 개념을 코드로 실습 → BitStat2-quarto” · 데이터 탐색기로 실제 데이터 적용 링크</text>

  <!-- ===== 오른쪽 여백 주석 ===== -->
  <g font-size="10" fill="#6b7280" font-style="italic">
    <text x="880" y="126">템플릿 원칙 —</text>
    <text x="880" y="146">18개 모듈이 이 골격(①제목 ②개념</text>
    <text x="880" y="161">③탭셋 ④확인·이동)을 그대로 공유.</text>
    <text x="880" y="176">학생이 두 번째 모듈부터는 배우는 법을</text>
    <text x="880" y="191">다시 배우지 않게 한다.</text>

    <text x="880" y="226">앱이 기본 탭인 이유 —</text>
    <text x="880" y="246">“만지며 직관”이 1차 목표. R 코드는</text>
    <text x="880" y="261">열어보는 학생에게만 (webr 셀,</text>
    <text x="880" y="276">shinylive와 별개 webR 인스턴스 —</text>
    <text x="880" y="291">GOTCHA §0 두 런타임 혼동 금지).</text>

    <text x="880" y="326">앱 UI는 clt형으로 통일 —</text>
    <text x="880" y="346">classic sidebarLayout(22개) 대신</text>
    <text x="880" y="361">BitStat2-shiny의 신형 clt 모듈</text>
    <text x="880" y="376">(bslib page_sidebar + card)을 표준으로.</text>
    <text x="880" y="391">각색 모듈 10개도 이 테마로 이식.</text>

    <text x="880" y="426">잉크 규칙 —</text>
    <text x="880" y="446">곡선은 잉크(#111827), 확률(넓이)만</text>
    <text x="880" y="461">액센트. 격자·범례·테두리 최소.</text>
    <text x="880" y="476">숫자는 값 상자 대신 문장 안에 —</text>
    <text x="880" y="491">“읽어주는 줄”이 해석을 가르친다.</text>

    <text x="880" y="526">교과서 표기 준수 —</text>
    <text x="880" y="546">모평균 m (μ 아님) · N(m, σ²) ·</text>
    <text x="880" y="561">Z = (X−m)/σ. 그래프 라벨·본문·</text>
    <text x="880" y="576">읽어주는 줄 모두 동일 표기.</text>

    <text x="880" y="611">한글 글꼴 —</text>
    <text x="880" y="631">shinylive 앱: showtext_auto().</text>
    <text x="880" y="646">Windows 전용 글꼴 금지(WASM).</text>

    <text x="880" y="686">성능 —</text>
    <text x="880" y="706">모듈당 앱 1개(standalone)만. 첫 로딩</text>
    <text x="880" y="721">1–2분은 페이지 상단 callout으로 안내.</text>
    <text x="880" y="736">viewerHeight는 폰 세로 화면 기준 검증.</text>

    <text x="880" y="776">교사 모드는 별도 화면이 아니라 —</text>
    <text x="880" y="796">각 모듈의 “수업 노트” 접기 callout로.</text>
    <text x="880" y="811">기존 교수용(teacher.R) 화면은 만들지</text>
    <text x="880" y="826">않는다 — 유지비 절반.</text>
  </g>

  <!-- ===== 푸터 ===== -->
  <line x1="40" y1="868" x2="1200" y2="868" stroke="#e5e7eb" stroke-width="1"/>
  <text x="40" y="892" font-size="10.5" fill="#6b7280">구현 — pages/03_dist/normal/index.qmd · {.panel-tabset} + 인라인 {shinylive-r}(#| standalone: true) + {webr-r} 셀 · 원형: BitStat2-shiny pages/05_infer/clt/index.qmd · 이 다이어그램: images/2026-07-06_hs_모듈_UI.svg</text>
</svg>
