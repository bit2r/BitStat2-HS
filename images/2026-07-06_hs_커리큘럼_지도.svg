<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 900" font-family="Georgia, 'Apple SD Gothic Neo', 'Noto Serif KR', serif">
  <!-- Tufte-style: 잉크 최소 · 헤어라인 · 단일 액센트(#2563EB) · 직접 라벨 -->
  <!-- 2026-07-06: 빛스탯 HS 커리큘럼 지도 — 교육과정 ↔ 모듈 ↔ BitStat2 재사용 매핑 -->
  <rect width="1240" height="900" fill="#ffffff"/>

  <!-- ===== 헤더 ===== -->
  <text x="40" y="42" font-size="22" fill="#111827" font-weight="bold">빛스탯 HS — 커리큘럼 지도 (5단원 · 18모듈)</text>
  <text x="40" y="64" font-size="12" fill="#6b7280">교육과정 단원 ↔ 모듈 ↔ BitStat2 원형 재사용 매핑 · 파란 표기 = 신규 개발 8개 · 2026-07-06</text>
  <line x1="40" y1="76" x2="1200" y2="76" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ===== 열 머리 ===== -->
  <g font-size="10" fill="#9ca3af" letter-spacing="2">
    <text x="40" y="106">단원 · 교육과정 근거</text>
    <text x="330" y="106">모듈 (pages/ 경로)</text>
    <text x="770" y="106">원형 (BitStat2-shiny 23개 중)</text>
    <text x="1030" y="106">비고</text>
  </g>
  <line x1="40" y1="114" x2="1200" y2="114" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ===== 01 자료와 그래프 ===== -->
  <text x="40" y="146" font-size="14" fill="#111827" font-weight="bold">01 자료와 그래프</text>
  <text x="40" y="164" font-size="9.5" fill="#6b7280">중1 대푯값·도수분포 / 중3 산포도·</text>
  <text x="40" y="178" font-size="9.5" fill="#6b7280">상자그림·산점도 — 고교 진단·복습</text>
  <g font-size="10.5">
    <text x="330" y="140" fill="#111827">01_data/freq_table — 도수분포표와 히스토그램</text>
    <text x="330" y="160" fill="#111827">01_data/center — 대푯값 (평균·중앙값·최빈값)</text>
    <text x="330" y="180" fill="#111827">01_data/spread — 산포도와 상자그림</text>
    <text x="330" y="200" fill="#111827">01_data/scatter — 산점도와 상관관계</text>
  </g>
  <g font-size="10" fill="#6b7280">
    <text x="770" y="140">desc_stat 각색</text>
    <text x="770" y="160">desc_stat·univariate_stat 각색</text>
    <text x="770" y="180" fill="#2563eb" font-weight="bold">신규 (상자그림 — 2022 개정 신설)</text>
    <text x="770" y="200">corr_reg 앞부분 각색</text>
  </g>
  <g font-size="9" fill="#9ca3af">
    <text x="1030" y="140">계급폭 슬라이더</text>
    <text x="1030" y="160">이상값 끌기 체험</text>
    <text x="1030" y="180">사분위수 시각화</text>
    <text x="1030" y="200">상관계수 직관</text>
  </g>
  <line x1="40" y1="218" x2="1200" y2="218" stroke="#f3f4f6" stroke-width="1"/>

  <!-- ===== 02 경우의 수와 확률 ===== -->
  <text x="40" y="250" font-size="14" fill="#111827" font-weight="bold">02 경우의 수와 확률</text>
  <text x="40" y="268" font-size="9.5" fill="#6b7280">확률과 통계 (1)·(2) — 순열·조합,</text>
  <text x="40" y="282" font-size="9.5" fill="#6b7280">확률의 뜻과 활용, 조건부확률</text>
  <g font-size="10.5">
    <text x="330" y="244" fill="#111827">02_prob/counting — 순열과 조합</text>
    <text x="330" y="264" fill="#111827">02_prob/prob_basic — 확률의 뜻 (동전·주사위 시뮬레이션)</text>
    <text x="330" y="284" fill="#111827">02_prob/conditional — 조건부확률과 독립</text>
  </g>
  <g font-size="10" fill="#6b7280">
    <text x="770" y="244" fill="#2563eb" font-weight="bold">신규 (나무그림·격자 시각화)</text>
    <text x="770" y="264" fill="#2563eb" font-weight="bold">신규 (lln 시뮬레이션 문법 차용)</text>
    <text x="770" y="284" fill="#2563eb" font-weight="bold">신규 (표·벤다이어그램 조작)</text>
  </g>
  <g font-size="9" fill="#9ca3af">
    <text x="1030" y="244">nPr·nCr 비교</text>
    <text x="1030" y="264">시행 횟수 → 수렴</text>
    <text x="1030" y="284">몬티홀 확장</text>
  </g>
  <line x1="40" y1="302" x2="1200" y2="302" stroke="#f3f4f6" stroke-width="1"/>

  <!-- ===== 03 확률분포 ===== -->
  <text x="40" y="334" font-size="14" fill="#111827" font-weight="bold">03 확률분포</text>
  <text x="40" y="352" font-size="9.5" fill="#6b7280">확률과 통계 (3) — 확률변수,</text>
  <text x="40" y="366" font-size="9.5" fill="#6b7280">이항분포, 정규분포와 표준화</text>
  <g font-size="10.5">
    <text x="330" y="328" fill="#111827">03_dist/random_var — 확률변수와 기댓값</text>
    <text x="330" y="348" fill="#111827">03_dist/binomial — 이항분포</text>
    <text x="330" y="368" fill="#111827">03_dist/normal — 정규분포와 표준화 (z점수)</text>
  </g>
  <g font-size="10" fill="#6b7280">
    <text x="770" y="328" fill="#2563eb" font-weight="bold">신규 (dist_discrete 앞단 재구성)</text>
    <text x="770" y="348">dist_discrete 각색 (이항만 남김)</text>
    <text x="770" y="368">dist_continuous + x_score 통합 각색</text>
  </g>
  <g font-size="9" fill="#9ca3af">
    <text x="1030" y="328">복권 기댓값 예제</text>
    <text x="1030" y="348">n·p 슬라이더</text>
    <text x="1030" y="368">μ·σ 슬라이더, 넓이=확률</text>
  </g>
  <line x1="40" y1="386" x2="1200" y2="386" stroke="#f3f4f6" stroke-width="1"/>

  <!-- ===== 04 통계적 추정 ===== -->
  <text x="40" y="418" font-size="14" fill="#111827" font-weight="bold">04 통계적 추정</text>
  <text x="40" y="436" font-size="9.5" fill="#6b7280">확률과 통계 (4) — 표본추출,</text>
  <text x="40" y="450" font-size="9.5" fill="#6b7280">표본평균의 분포, 모평균·모비율 추정</text>
  <g font-size="10.5">
    <text x="330" y="412" fill="#111827">04_infer/sampling — 표본추출 방법</text>
    <text x="330" y="432" fill="#111827">04_infer/sample_mean — 표본평균의 분포 (중심극한정리)</text>
    <text x="330" y="452" fill="#111827">04_infer/ci_mean — 모평균의 신뢰구간</text>
    <text x="330" y="472" fill="#111827">04_infer/ci_prop — 모비율의 추정</text>
  </g>
  <g font-size="10" fill="#6b7280">
    <text x="770" y="412">sampling_method 각색</text>
    <text x="770" y="432">clt 그대로 (신 Tufte UI 원형)</text>
    <text x="770" y="452">ci 각색 (고교 기호 σ 알려진 경우)</text>
    <text x="770" y="472">one_prop 각색</text>
  </g>
  <g font-size="9" fill="#9ca3af">
    <text x="1030" y="412">우리 반 = 표본</text>
    <text x="1030" y="432">n 커지면 정규로</text>
    <text x="1030" y="452">95% 뜻 시뮬레이션</text>
    <text x="1030" y="472">여론조사 연결</text>
  </g>
  <line x1="40" y1="490" x2="1200" y2="490" stroke="#f3f4f6" stroke-width="1"/>

  <!-- ===== 05 통계와 사회 ===== -->
  <text x="40" y="522" font-size="14" fill="#111827" font-weight="bold">05 통계와 사회</text>
  <text x="40" y="540" font-size="9.5" fill="#6b7280">「통계와 사회」(2022 개정 융합선택) —</text>
  <text x="40" y="554" font-size="9.5" fill="#6b7280">자료 수집·정리·해석, 통계적 탐구</text>
  <g font-size="10.5">
    <text x="330" y="516" fill="#111827">05_society/explorer — hsData 데이터 탐색기</text>
    <text x="330" y="536" fill="#111827">05_society/make_chart — 통계 그래프 만들기</text>
    <text x="330" y="556" fill="#111827">05_society/poll — 여론조사 읽기 (표본오차·신뢰수준)</text>
    <text x="330" y="576" fill="#111827">05_society/project — 통계적 탐구 프로젝트 안내</text>
  </g>
  <g font-size="10" fill="#6b7280">
    <text x="770" y="516" fill="#2563eb" font-weight="bold">신규 (기존 BitStat2-HS app.R 이식)</text>
    <text x="770" y="536">esquisse·viz 각색</text>
    <text x="770" y="556" fill="#2563eb" font-weight="bold">신규 (ci_prop 응용)</text>
    <text x="770" y="576" fill="#2563eb" font-weight="bold">신규 (문서형 + 탐색기 연동)</text>
  </g>
  <g font-size="9" fill="#9ca3af">
    <text x="1030" y="516">변수 끌어놓기 유지</text>
    <text x="1030" y="536">끌어서 ggplot</text>
    <text x="1030" y="556">뉴스 기사 해석</text>
    <text x="1030" y="576">수행평가 틀 제공</text>
  </g>
  <line x1="40" y1="594" x2="1200" y2="594" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ===== 집계 밴드 ===== -->
  <g font-size="11" fill="#6b7280">
    <text x="40" y="626" fill="#111827" font-weight="bold">집계</text>
    <text x="120" y="626">모듈 18개 = 재사용·각색 10개 + 신규 8개</text>
    <text x="520" y="626">교사 부담 최소화: 각 모듈이 성취기준 1개에 대응, 45분 수업 1차시 분량</text>
  </g>

  <!-- 재사용 흐름 요약 -->
  <rect x="40" y="648" width="1160" height="132" rx="10" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="676" font-size="12" fill="#111827" font-weight="bold">BitStat2 23개 모듈 중 무엇을 가져오고 무엇을 버리나</text>
  <g font-size="10" fill="#6b7280">
    <text x="60" y="702" fill="#111827" font-weight="bold">가져옴 (10)</text>
    <text x="170" y="702">desc_stat · univariate_stat · corr_reg · dist_discrete · dist_continuous · x_score · sampling_method · clt · ci · one_prop (+ esquisse·viz·lln 문법 차용)</text>
    <text x="60" y="726" fill="#111827" font-weight="bold">제외 (이유)</text>
    <text x="170" y="726">two_means·two_prop·one_mean(t검정 — 고교 범위 밖) · mle·clustering·sample_size(대학 수준) · dist_fitting·multivariate_stat·wordcloud(교육과정 무관)</text>
    <text x="60" y="750" fill="#111827" font-weight="bold">각색 원칙</text>
    <text x="170" y="750">용어를 교과서 표기로(모평균 m, 표준편차 σ 등) · 예제 데이터를 hsData로 교체 · 수식은 교과서 수준까지만 · 앱 UI는 clt형 Tufte 테마로 통일</text>
  </g>

  <!-- ===== 주석 ===== -->
  <g font-size="10" fill="#6b7280" font-style="italic">
    <text x="40" y="812">학습 동선 — 01은 진단(중학 복습), 02→04는 「확률과 통계」 교과서 목차 그대로, 05는 과목 「통계와 사회」·수행평가와 연결.</text>
    <text x="40" y="827">교사는 교과서 쪽수에서 모듈로 바로 이동할 수 있어야 한다 — 홈 커리큘럼 지도에 단원·성취기준 코드를 함께 표기.</text>
  </g>

  <!-- ===== 푸터 ===== -->
  <line x1="40" y1="848" x2="1200" y2="848" stroke="#e5e7eb" stroke-width="1"/>
  <text x="40" y="872" font-size="10.5" fill="#6b7280">근거 — 2022 개정 수학과 교육과정: 중학 통계(대푯값·산포도·상자그림·산점도) · 「확률과 통계」(경우의 수·확률·확률분포·통계적 추정) · 「통계와 사회」(융합선택) — 성취기준 코드는 구현 시 확정</text>
  <text x="40" y="890" font-size="10.5" fill="#6b7280">이 다이어그램: images/2026-07-06_hs_커리큘럼_지도.svg</text>
</svg>
